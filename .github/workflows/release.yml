name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (primary) ──────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            tool: cross
            experimental: false

          # ── Android Termux aarch64 ──────────────────────────────────────────
          # Marked experimental: Android NDK linker setup in standard runners
          # is fragile. The binary requires termux-api on the device.
          - target: aarch64-linux-android
            runner: ubuntu-latest
            tool: cross
            experimental: true

          # ── macOS Intel ─────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            runner: macos-13
            tool: cargo
            experimental: false

          # ── macOS Apple Silicon ─────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-latest
            tool: cargo
            experimental: false

          # ── Windows x86_64 ──────────────────────────────────────────────────
          # No MPRIS/D-Bus; zbus/tokio are not compiled in (linux-only target deps).
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            tool: cargo
            experimental: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Install `cross` only for targets that need it (Linux cross-compilation)
      - name: Install cross
        if: matrix.tool == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Install Linux audio dev libraries for native linux builds
      - name: Install Linux audio dependencies
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            pkg-config \
            libdbus-1-dev

      - name: Build (cross)
        if: matrix.tool == 'cross'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.tool == 'cargo'
        run: cargo build --release --target ${{ matrix.target }}

      # Determine binary extension (.exe on Windows, none elsewhere)
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/mixed"
          ARCHIVE="mixed-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/mixed.exe"
          $archive = "mixed-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          echo "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mixed-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: always()  # run even if some experimental builds failed

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: mixed ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/**/*
          body: |
            ## mixed ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Linux x86_64 | `mixed-*-x86_64-unknown-linux-gnu.tar.gz` |
            | macOS Intel | `mixed-*-x86_64-apple-darwin.tar.gz` |
            | macOS Apple Silicon | `mixed-*-aarch64-apple-darwin.tar.gz` |
            | Windows x86_64 | `mixed-*-x86_64-pc-windows-msvc.zip` |
            | Android Termux aarch64 | `mixed-*-aarch64-linux-android.tar.gz` *(experimental)* |

            ### Android (Termux) Notes
            Requires `termux-api` app installed and `pkg install termux-api` in Termux.
